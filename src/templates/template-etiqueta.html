<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: 'Arial Narrow', Arial, sans-serif;
        font-size: 22px;
        font-weight: bold;
      }

      p,
      body {
        margin: 0;
        padding: 0;
      }

      @page {
        margin: 0;
      }

      .page {
        width: 100%;
        height: 100vh;
        position: relative;
        page-break-after: always;
      }

      .rotated {
        position: absolute;
        top: 0;
        left: 0;

        transform: rotate(270deg) translateX(-100%);
        transform-origin: top left;
      }

      .container-etiqueta {
        width: 425px;
        height: 283px;
        box-sizing: border-box;
        padding: 18px 8px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .container-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }

      .container-nota-fiscal {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .container-volume-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .numeros-container {
        display: flex;
        gap: 3px;
        align-items: center;
        font-size: 30px;
      }

      .numero {
        width: 51px;
        height: 75px;
        border: 1px solid #000;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo {
        height: 75px;
      }
    </style>
  </head>
  <body>
    {{#each volumes}}
    <div class="page">
      <div class="rotated">
        <div class="container-etiqueta">
          <p>Cliente: {{cliente}}</p>

          <div class="container-info">
            <p>Nro. Pedido: {{numeroUnico}}</p>
            <p>UF: {{uf}}</p>
          </div>

          <div class="container-nota-fiscal">
            <p>Nota Fiscal:</p>
            <div class="numeros-container">
              {{#each notaFiscalDigitos}}
              <div class="numero">{{this}}</div>
              {{/each}}
            </div>
          </div>

          <div class="container-volume-item">
            <img class="logo" src="{{logoBase64}}" alt="Logo Modial" />

            <div class="numeros-container">
              {{#each seqVolDigitos}}
              <div class="numero">{{this}}</div>
              {{/each}}

              <span>-</span>

              {{#each totalVolDigitos}}
              <div class="numero">{{this}}</div>
              {{/each}}
            </div>
          </div>
        </div>
      </div>
    </div>
    {{/each}}
  </body>
</html>
