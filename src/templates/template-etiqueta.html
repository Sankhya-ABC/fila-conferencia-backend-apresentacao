<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        font-size: 22px;
        font-weight: bold;
      }

      p,
      body {
        margin: 0;
      }

      .container-etiqueta {
        width: 500px;
        height: 300px;
        border: 1px solid #000;
        padding: 30px 20px;
        page-break-after: always;
      }

      .container-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .container-volume-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
      }

      .numeros-container {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .numero {
        width: 70px;
        height: 95px;
        border: 1px solid #000;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      img {
        height: 60px;
      }
    </style>
  </head>
  <body>
    {{#each volumes}}
    <div class="container-etiqueta">
      <p>Cliente: {{cliente}}</p>

      <div class="container-info">
        <p>Nro. Pedido: {{numeroUnico}}</p>
        <p>UF: {{uf}}</p>
      </div>

      <p>Nota Fiscal:</p>
      <div class="numeros-container">
        {{#each notaFiscalDigitos}}
        <div class="numero">{{this}}</div>
        {{/each}}
      </div>

      <div class="container-volume-item">
        <img src="{{logoBase64}}" alt="Logo Modial" />

        <div class="numeros-container">
          {{#each seqVolDigitos}}
          <div class="numero">{{this}}</div>
          {{/each}}

          <span>-</span>

          {{#each seqItemDigitos}}
          <div class="numero">{{this}}</div>
          {{/each}}
        </div>
      </div>
    </div>
    {{/each}}
  </body>
</html>
