<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        font-size: 22px;
        font-weight: bold;
      }

      p,
      body {
        margin: 0;
      }

      .container-etiqueta {
        width: 500px;
        height: 300px;
        border: 1px solid #000;
        padding: 30px 20px;
        page-break-after: always;
      }

      .container-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .container-volume-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
      }

      .numero {
        width: 70px;
        width: 95px;
        border: 1px solid #000;
        border-radius: 20px;
      }
    </style>
  </head>
  <body>
    {{#each volumes}}
    <div class="container-etiqueta">
      <p>Cliente: {{cliente}}</p>

      <div class="container-info">
        <p>Nro. Pedido: {{numeroUnico}}</p>
        <p>UF: {{uf}}</p>
      </div>

      <p>Nota Fiscal: {{notaFiscal}}</p>

      <div class="container-volume-item">
        <img src="src/templates/modial-logo.png" alt="Logo Modial" />
        <p>{{seqVol}} - {{seqItem}}</p>
      </div>
    </div>
    {{/each}}
  </body>
</html>
